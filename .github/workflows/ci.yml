name: CyberGuard CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 11.9.0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-style: 'pnpm'
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint Workspace
      run: pnpm lint

    - name: Database Generate Client
      run: pnpm --filter "@cyberguard/database" prisma:generate

    - name: Type Check & Build Packages
      run: pnpm --filter "@cyberguard/types" build && pnpm --filter "@cyberguard/ui" build

    - name: Build Applications
      run: pnpm --filter "@cyberguard/web" build && pnpm --filter "@cyberguard/api" build

    - name: Run Tests
      run: pnpm test
